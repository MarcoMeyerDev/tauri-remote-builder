name: CodexBox Codex build probe

'on':
  workflow_dispatch:
    inputs:
      codex_ref:
        description: "openai/codex ref to test"
        required: true
        default: "rust-v0.131.0-alpha.9"
      probe:
        description: "Probe level"
        required: true
        default: "home-dir-test"
        type: choice
        options:
          - home-dir-test
          - cli-check
          - patched-debug-build
          - patched-release-build

jobs:
  probe-windows:
    name: Windows Codex Rust probe
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout OpenAI Codex source
        uses: actions/checkout@v4
        with:
          repository: openai/codex
          ref: ${{ inputs.codex_ref }}
          path: codex-source
          persist-credentials: false

      - name: Install Rust 1.93.0
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Print tool versions
        shell: pwsh
        run: |
          Write-Host "Runner: $env:RUNNER_NAME"
          Write-Host "OS: $([System.Environment]::OSVersion.VersionString)"
          git --version
          git config --show-origin --get core.autocrlf
          rustc --version
          cargo --version

      - name: Patch CodexBox AppContainer home-dir behavior
        if: ${{ inputs.probe == 'patched-debug-build' || inputs.probe == 'patched-release-build' }}
        shell: pwsh
        run: |
          $path = "codex-source/codex-rs/utils/home-dir/src/lib.rs"
          $text = Get-Content -LiteralPath $path -Raw
          $text = $text -replace "`r`n", "`n"
          $old = @(
            '            } else {'
            '                let canonical = path.canonicalize().map_err(|err| {'
            '                    std::io::Error::new('
            '                        err.kind(),'
            '                        format!("failed to canonicalize CODEX_HOME {val:?}: {err}"),'
            '                    )'
            '                })?;'
            '                AbsolutePathBuf::from_absolute_path(canonical)'
            '            }'
          ) -join "`n"
          $new = @(
            '            } else if std::env::var("CODEXBOX_APPCONTAINER").as_deref() == Ok("1") {'
            '                AbsolutePathBuf::from_absolute_path(path)'
            '            } else {'
            '                let canonical = path.canonicalize().map_err(|err| {'
            '                    std::io::Error::new('
            '                        err.kind(),'
            '                        format!("failed to canonicalize CODEX_HOME {val:?}: {err}"),'
            '                    )'
            '                })?;'
            '                AbsolutePathBuf::from_absolute_path(canonical)'
            '            }'
          ) -join "`n"
          if (-not $text.Contains($old)) {
            Write-Error "Expected home-dir canonicalization block was not found. Source changed; stop instead of guessing."
          }
          $text = $text.Replace($old, $new)
          $text = $text -replace "`n", "`r`n"
          [System.IO.File]::WriteAllText($path, $text, [System.Text.UTF8Encoding]::new($false))
          Select-String -LiteralPath $path -Pattern "CODEXBOX_APPCONTAINER" -Context 2,2

      - name: Force state migrations to CRLF for native DB checksum compatibility
        if: ${{ inputs.probe == 'patched-debug-build' || inputs.probe == 'patched-release-build' }}
        shell: pwsh
        run: |
          $migrationDir = "codex-source/codex-rs/state/migrations"
          Get-ChildItem -LiteralPath $migrationDir -Filter "*.sql" | ForEach-Object {
            $text = [System.IO.File]::ReadAllText($_.FullName)
            $text = $text -replace "`r?`n", "`r`n"
            [System.IO.File]::WriteAllText($_.FullName, $text, [System.Text.UTF8Encoding]::new($false))
          }
          $hash = (Get-FileHash -Algorithm SHA384 -LiteralPath "$migrationDir/0001_threads.sql").Hash
          Write-Host "0001_threads.sql SHA384=$hash"
          if ($hash -ne "54BBD6F47905A4E4C674034575963D82DA7B534E66E9A37A81EC2AFB6A4B56CE6DE9B3ECF3032796A800F650239847D4") {
            Write-Error "CRLF migration checksum does not match Marco native DB migration 1."
          }

      - name: Run small home-dir test
        if: ${{ inputs.probe == 'home-dir-test' }}
        shell: pwsh
        working-directory: codex-source/codex-rs
        run: cargo test -p codex-utils-home-dir

      - name: Run codex-cli check
        if: ${{ inputs.probe == 'cli-check' }}
        shell: pwsh
        working-directory: codex-source/codex-rs
        run: cargo check -p codex-cli --bin codex

      - name: Build patched Codex debug binary
        if: ${{ inputs.probe == 'patched-debug-build' }}
        shell: pwsh
        working-directory: codex-source/codex-rs
        run: cargo build -p codex-cli --bin codex

      - name: Build patched Codex release binary
        if: ${{ inputs.probe == 'patched-release-build' }}
        shell: pwsh
        working-directory: codex-source/codex-rs
        run: cargo build --release -p codex-cli --bin codex

      - name: Verify patched Codex artifact
        if: ${{ inputs.probe == 'patched-debug-build' || inputs.probe == 'patched-release-build' }}
        shell: pwsh
        run: |
          if ("${{ inputs.probe }}" -eq "patched-release-build") {
            $profile = "release"
          } else {
            $profile = "debug"
          }
          $exe = "codex-source/codex-rs/target/$profile/codex.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            Write-Error "Missing built codex.exe at $exe"
          }
          & $exe --version
          New-Item -ItemType Directory -Force -Path "artifact" | Out-Null
          Copy-Item -LiteralPath $exe -Destination "artifact/codex.exe" -Force
          $manifest = [ordered]@{
            built_at_utc = (Get-Date).ToUniversalTime().ToString("o")
            codex_ref = "${{ inputs.codex_ref }}"
            probe = "${{ inputs.probe }}"
            cargo_profile = $profile
            patch = "CODEXBOX_APPCONTAINER skips CODEX_HOME canonicalize"
            migration_line_endings = "CRLF"
            migration_0001_sha384 = (Get-FileHash -Algorithm SHA384 -LiteralPath "codex-source/codex-rs/state/migrations/0001_threads.sql").Hash
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath "artifact/codexbox-build-manifest.json" -Encoding utf8

      - name: Upload patched Codex artifact
        if: ${{ inputs.probe == 'patched-debug-build' || inputs.probe == 'patched-release-build' }}
        uses: actions/upload-artifact@v4
        with:
          name: codexbox-codex-${{ inputs.codex_ref }}-${{ inputs.probe }}-windows-x64
          path: artifact
