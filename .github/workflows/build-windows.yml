name: Build Windows Tauri exe

on:
  workflow_dispatch:
  push:
    branches: [main, vanilla-html-css-js-tauri]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Generate Tauri icons
        shell: pwsh
        run: ./scripts/create-tauri-icons.ps1

      - name: Build with official Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package portable exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Compress-Archive -Path src-tauri/target/release/vanilla-html-css-js-tauri.exe -DestinationPath artifacts/vanilla-html-css-js-tauri.exe.zip -Force

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: vanilla-html-css-js-tauri-exe
          path: artifacts/vanilla-html-css-js-tauri.exe.zip
